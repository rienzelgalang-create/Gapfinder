<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | GapFinder</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f4f7f6; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; position: relative; }
        .back-link { position: absolute; top: 20px; left: 20px; color: #888; text-decoration: none; font-size: 1.2rem; }
        h2 { font-family: 'Montserrat', sans-serif; color: var(--dark-bg); margin-bottom: 10px; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; margin-bottom: 20px; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>

    <div class="card">
        <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i></a>
        <h2>Reset Password</h2>
        <p>Enter your email address and we'll send you a link to reset your password.</p>
        
        <form id="resetForm">
            <input type="email" id="resetEmail" placeholder="Enter your email" required>
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">SEND RESET LINK</button>
        </form>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('resetEmail').value;
            
            // Simulation of sending email (Real email sending requires a backend email service)
            if(email) {
                alert(`If an account exists for ${email}, we have sent a password reset link!`);
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
