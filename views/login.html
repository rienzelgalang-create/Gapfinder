<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In | GapFinder Math Tutor App</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">

    <style>
        .signup-container { display: flex; height: 100vh; width: 100%; }
        
        .form-side {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            padding: 0 8%; background: var(--white); position: relative; overflow-y: auto;
        }

        /* BACK ARROW STYLE */
        .back-home {
            position: absolute; 
            top: 30px; left: 30px;
            width: 40px; height: 40px;
            background: #f0f0f0; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            text-decoration: none; color: #555; font-size: 1.2rem;
            transition: all 0.3s ease;
        }
        .back-home:hover { background: var(--primary-blue); color: white; transform: translateX(-3px); }

        .form-side h2 { font-family: 'Montserrat', sans-serif; font-size: 2rem; margin-bottom: 10px; color: var(--dark-bg); }
        .form-side p { color: #666; margin-bottom: 30px; }
        
        .submit-btn { width: 100%; justify-content: center; margin-top: 10px; }

        .form-footer {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 25px; font-size: 0.9rem; color: #333;
        }
        .forgot-pass { text-decoration: none; color: #888; font-weight: 500; transition: color 0.3s; }
        .forgot-pass:hover { color: var(--primary-blue); }

        /* PASSWORD CONTAINER STYLES */
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper input { width: 100%; padding-right: 40px; }
        .toggle-password {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #888; font-size: 1rem; transition: color 0.3s;
        }
        .toggle-password:hover { color: var(--primary-blue); }

        .visual-side {
            flex: 1;
            background: linear-gradient(rgba(22, 38, 34, 0.85), rgba(22, 38, 34, 0.85)), 
                        url('https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&q=80&w=2000') no-repeat center center/cover;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 60px; color: white; text-align: center;
        }
        .visual-side img { width: 100px; margin-bottom: 20px; }
        .visual-side h1 { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 900; line-height: 1.1; }
        .visual-side h1 span { color: #a3c9b8; }

        @media (max-width: 900px) {
            .visual-side { display: none; }
            .signup-container { height: auto; min-height: 100vh; }
            .form-side { padding: 80px 5%; }
        }
    </style>
</head>
<body>

<div class="signup-container">
    <a href="index.html" class="back-home" title="Back to Home">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <div class="form-side">
        <h2>Welcome Back!</h2>
        <p>Log in to continue tracking your students' progress.</p>

        <form action="#">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="emailInput" placeholder="email@address.com" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordInput" placeholder="Enter your password" required>
                    <i class="fa-regular fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <div class="form-footer">
                <label style="font-weight: 500; font-size: 0.9rem; color: #666; cursor: pointer;">
                    <input type="checkbox" id="rememberMe" style="width: auto; margin-right: 5px;"> Remember me
                </label>
                <a href="forgot-password.html" class="forgot-pass">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary submit-btn">
                LOG IN
            </button>

            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                Don't have an account? <a href="signup.html" style="color: var(--primary-blue); text-decoration: none; font-weight: 600;">Sign Up</a>
            </p>
        </form>
    </div>

    <div class="visual-side">
        <img src="QuERST-logo.png" alt="QuERST Logo">
        <h1>CONTINUE<br><span>TARGETING.</span></h1>
        <p style="margin-top: 20px; font-size: 1.1rem; opacity: 0.9;">
            "Education is not the learning of facts, but the training of the mind to think."
        </p>
    </div>
</div>

<script>
    // 1. ON PAGE LOAD: Check for "Remember Me"
    document.addEventListener("DOMContentLoaded", () => {
        const savedEmail = localStorage.getItem("rememberedEmail");
        if (savedEmail) {
            document.getElementById("emailInput").value = savedEmail;
            document.getElementById("rememberMe").checked = true;
        }
    });

    // 2. TOGGLE PASSWORD VISIBILITY
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('passwordInput');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye');
        this.classList.toggle('fa-eye-slash');
    });

    // 3. HANDLE LOGIN
    document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const email = document.getElementById("emailInput").value;
        const password = document.getElementById("passwordInput").value;
        const rememberMe = document.getElementById("rememberMe").checked;

        try {
            const response = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await response.json();

            if (response.ok) {
                // Handle "Remember Me"
                if (rememberMe) {
                    localStorage.setItem("rememberedEmail", email);
                } else {
                    localStorage.removeItem("rememberedEmail");
                }

                // Save user info locally
                localStorage.setItem('user', JSON.stringify(data.user));
                
                // --- REDIRECT LOGIC ---
                if (data.user.role === 'admin') {
                    window.location.href = 'admin-dashboard.html';
                } else if (data.user.role === 'student') {
                    window.location.href = 'student-dashboard.html';
                } else {
                    window.location.href = 'teacher-dashboard.html';
                }

            } else {
                alert(data.message);
            }
        } catch (error) {
            console.error('Error:', error);
            alert("Could not connect to server.");
        }
    });
</script>

</body>
</html>
